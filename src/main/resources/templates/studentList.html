<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список студентов</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f5f5f5; }
        h2 { color: #333; }
        form { margin-bottom: 15px; }
        input[type="text"], input[type="number"] { padding: 5px; margin: 3px; }
        input[type="submit"] { padding: 5px 10px; background-color: #FF9800; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #e68900; }
        table { border-collapse: collapse; width: 100%; background: white; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #FF9800; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .delete-btn { background-color: #f44336; }
        .delete-btn:hover { background-color: #da190b; }
        a { color: #FF9800; }
    </style>
</head>
<body>
<h1>Управление студентами</h1>

<a href="/categories">Категории</a> |
<a href="/roles">Роли</a> |
<a href="/menu-items">Блюда</a>

<h2>Поиск</h2>
<form method="get" action="/students">
    <input type="text" name="search" placeholder="Поиск по id или имени" th:value="${search}">
    <input type="submit" value="Найти">
</form>

<h2>Добавить студента</h2>
<form method="post" action="/students/add">
    <input type="text" placeholder="Имя" name="name" required>
    <input type="text" placeholder="Фамилия" name="surname" required>
    <input type="number" placeholder="Возраст" name="age" required>
    <input type="submit" value="Добавить">
</form>

<h2>Все студенты:</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Возраст</th>
        <th>Изменить</th>
        <th>Удалить</th>
    </tr>
    <tr th:each="student : ${students}">
        <td th:text="${student.id}"></td>
        <td th:text="${student.name}"></td>
        <td th:text="${student.surname}"></td>
        <td th:text="${student.age}"></td>
        <td>
            <form method="post" action="/students/update">
                <input type="hidden" name="id" th:value="${student.id}">
                <input type="text" name="name" th:value="${student.name}" required>
                <input type="text" name="surname" th:value="${student.surname}" required>
                <input type="number" name="age" th:value="${student.age}" required>
                <input type="submit" value="Сохранить">
            </form>
        </td>
        <td>
            <form method="post" action="/students/delete">
                <input type="hidden" name="id" th:value="${student.id}">
                <input type="submit" value="Удалить" class="delete-btn">
            </form>
        </td>
    </tr>
</table>
</body>
</html>
