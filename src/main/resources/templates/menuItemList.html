<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список блюд</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f5f5f5; }
        h2 { color: #333; }
        form { margin-bottom: 15px; }
        input[type="text"], input[type="number"] { padding: 5px; margin: 3px; }
        input[type="submit"] { padding: 5px 10px; background-color: #2196F3; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0b7dda; }
        table { border-collapse: collapse; width: 100%; background: white; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #2196F3; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .delete-btn { background-color: #f44336; }
        .delete-btn:hover { background-color: #da190b; }
        a { color: #2196F3; }
    </style>
</head>
<body>
<h1>Управление блюдами</h1>

<a href="/students">Студенты</a> |
<a href="/roles">Роли</a> |
<a href="/categories">Категории</a>

<h2>Поиск</h2>
<form method="get" action="/menu-items">
    <input type="text" name="search" placeholder="Поиск по id или названию" th:value="${search}">
    <input type="submit" value="Найти">
</form>

<h2>Добавить блюдо</h2>
<form method="post" action="/menu-items/add">
    <input type="text" placeholder="Название" name="name" required>
    <input type="text" placeholder="Описание" name="description">
    <input type="number" step="0.01" placeholder="Цена" name="price" required>
    <input type="number" placeholder="ID Категории" name="categoryId" required>
    <input type="hidden" name="imageUrl" value="нет фото">
    <input type="hidden" name="isAvailable" value="true">
    <input type="submit" value="Добавить">
</form>

<h2>Все блюда:</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Название</th>
        <th>Описание</th>
        <th>Цена</th>
        <th>Категория ID</th>
        <th>Изменить</th>
        <th>Удалить</th>
    </tr>
    <tr th:each="item : ${menuItems}">
        <td th:text="${item.idMenuItem}"></td>
        <td th:text="${item.name}"></td>
        <td th:text="${item.description}"></td>
        <td th:text="${item.price} + ' руб.'"></td>
        <td th:text="${item.categoryId}"></td>
        <td>
            <form method="post" action="/menu-items/update">
                <input type="hidden" name="idMenuItem" th:value="${item.idMenuItem}">
                <input type="text" name="name" th:value="${item.name}" required>
                <input type="text" name="description" th:value="${item.description}">
                <input type="number" step="0.01" name="price" th:value="${item.price}" required>
                <input type="number" name="categoryId" th:value="${item.categoryId}" required>
                <input type="hidden" name="imageUrl" th:value="${item.imageUrl}">
                <input type="hidden" name="isAvailable" th:value="${item.available}">
                <input type="submit" value="Сохранить">
            </form>
        </td>
        <td>
            <form method="post" action="/menu-items/delete">
                <input type="hidden" name="idMenuItem" th:value="${item.idMenuItem}">
                <input type="submit" value="Удалить" class="delete-btn">
            </form>
        </td>
    </tr>
</table>
</body>
</html>
